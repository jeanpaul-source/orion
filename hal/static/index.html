<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAL</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
  <noscript>
    <p style="color:#c9d1d9;background:#0d1117;padding:2rem;font-family:monospace;text-align:center">
      HAL requires JavaScript to run. Please enable it in your browser settings.
    </p>
  </noscript>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-brand">HAL</span>
      <span id="health-dot" class="health-dot" title="Checking..."></span>
      <button id="kb-btn" class="kb-btn" title="Knowledge Base">KB</button>
    </div>
    <button id="new-session-btn" class="new-session-btn">+ New Session</button>
    <input id="session-search" class="session-search" type="text" placeholder="search sessions…">
    <div id="session-list" class="session-list"></div>
    <div class="sidebar-footer">
      <div id="metrics-bars" class="metrics-bars">
        <div class="metric-row"><span class="metric-label">CPU</span><div class="metric-track"><div id="bar-cpu" class="metric-fill" style="width:0"></div></div><span id="val-cpu" class="metric-val">—</span></div>
        <div class="metric-row"><span class="metric-label">MEM</span><div class="metric-track"><div id="bar-mem" class="metric-fill" style="width:0"></div></div><span id="val-mem" class="metric-val">—</span></div>
        <div class="metric-row"><span class="metric-label">GPU</span><div class="metric-track"><div id="bar-gpu" class="metric-fill" style="width:0"></div></div><span id="val-gpu" class="metric-val">—</span></div>
      </div>
      <span id="health-text" class="health-text">checking...</span>
      <button id="sign-out-btn" class="sign-out-btn" title="Sign out">sign out</button>
    </div>
  </aside>

  <!-- Main chat area -->
  <main id="main" class="main">
    <!-- Mobile header -->
    <header id="mobile-header" class="mobile-header">
      <button id="hamburger" class="hamburger" aria-label="Toggle sidebar">&#9776;</button>
      <span class="mobile-brand">HAL</span>
      <span id="mobile-session" class="mobile-session"></span>
    </header>

    <div id="chat-area" class="chat-area">
      <div id="messages" class="messages"></div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="message-input" class="message-input" placeholder="ask hal..." rows="2"></textarea>
        <button id="send-btn" class="send-btn" aria-label="Send" title="Send">&#8593;</button>
      </div>
    </div>
  </main>

  <!-- Sidebar overlay for mobile -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- KB Browser panel -->
  <aside id="kb-panel" class="kb-panel">
    <div class="kb-panel-header">
      <span class="kb-panel-title">Knowledge Base</span>
      <button id="kb-panel-close" class="kb-panel-close" aria-label="Close">&times;</button>
    </div>
    <div class="kb-search-bar">
      <input id="kb-search-input" class="kb-search-input" type="text" placeholder="semantic search…">
      <button id="kb-search-btn" class="kb-search-btn" aria-label="Search">&#x279C;</button>
    </div>
    <div id="kb-active-filter" class="kb-active-filter" style="display:none"></div>
    <div id="kb-panel-body" class="kb-panel-body"></div>
  </aside>
  <div id="kb-panel-overlay" class="kb-panel-overlay"></div>

  <!-- Health detail panel -->
  <aside id="health-panel" class="health-panel">
    <div class="health-panel-header">
      <span class="health-panel-title">System Health</span>
      <button id="health-panel-close" class="health-panel-close" aria-label="Close">&times;</button>
    </div>
    <div id="health-panel-body" class="health-panel-body"></div>
  </aside>
  <div id="health-panel-overlay" class="health-panel-overlay"></div>

  <!-- Login overlay -->
  <div id="login-overlay" class="login-overlay" style="display:none">
    <div class="login-card">
      <div class="login-brand">HAL</div>
      <p class="login-hint">Enter your access token to continue.</p>
      <input id="token-input" class="login-input" type="password" placeholder="paste token here" autocomplete="off">
      <button id="login-btn" class="login-btn">Authenticate</button>
      <p id="login-error" class="login-error"></p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
