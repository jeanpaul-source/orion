minimum_pre_commit_version: "4.0"
default_install_hook_types: [pre-commit, pre-push]
fail_fast: false

repos:
  # ── Remote hooks (maintained upstream) ─────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff                     # lint + fix
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format              # format check

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        args: []                     # config in .markdownlint-cli2.yaml

  # ── Local hooks (use project venv) ─────────────────────────────────
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/bin/mypy hal/
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

      - id: pytest
        name: pytest (offline suite)
        entry: bash -c '.venv/bin/pytest tests/ --ignore=tests/test_intent.py
          --cov=hal --cov-report=term-missing
          --cov-fail-under=$(cat .coverage-threshold)
          -q --no-header --tb=short'
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
        stages: [pre-push]           # ~8s; too slow for pre-commit

      - id: doc-drift
        name: doc-drift check
        entry: .venv/bin/python scripts/check_doc_drift.py
        language: system
        always_run: true
        pass_filenames: false
        require_serial: true

      - id: commitlint
        name: commitlint
        entry: npx --no -- commitlint --edit
        language: system
        stages: [commit-msg]
        always_run: true
        pass_filenames: false
