name: CI

on:
  push:
    branches: ["*"]        # every branch, not just main
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0             # commitlint needs full history

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pip-tools
          pip-sync requirements.lock requirements-dev.lock

      - name: Audit dependencies
        run: pip-audit

      - name: Ruff lint
        run: ruff check --output-format=github hal/ tests/ harvest/ eval/

      - name: Ruff format
        run: ruff format --check hal/ tests/ harvest/ eval/

      - name: Mypy
        run: mypy hal/

      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101 # v22
        # Globs read from .markdownlint-cli2.yaml (single source of truth)

      - name: Commitlint
        # Validates commit messages match Conventional Commits format.
        # Uses wagoid/commitlint-github-action which automatically lints
        # all PR commits or the HEAD commit on direct pushes.
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6
        with:
          configFile: commitlint.config.mjs

      - name: Tests + Coverage
        run: |
          THRESHOLD=$(cat .coverage-threshold)
          pytest tests/ --ignore=tests/test_intent.py \
            --cov=hal --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=$THRESHOLD \
            --junitxml=junit-results.xml \
            -q --no-header

      - name: Doc-drift check
        run: python scripts/check_doc_drift.py

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: test-results
          path: |
            junit-results.xml
            coverage.xml
