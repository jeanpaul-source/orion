name: CI

on:
  push:
    branches: ["*"]        # every branch, not just main
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0             # commitlint needs full history

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Audit dependencies
        run: pip-audit

      - name: Ruff lint
        run: ruff check --output-format=github hal/ tests/ harvest/ eval/

      - name: Ruff format
        run: ruff format --check hal/ tests/ harvest/ eval/

      - name: Mypy
        run: mypy hal/

      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        # Globs read from .markdownlint-cli2.yaml (single source of truth)

      - name: Commitlint
        # Validates commit messages match Conventional Commits format.
        # Uses wagoid/commitlint-github-action which automatically lints
        # all PR commits or the HEAD commit on direct pushes.
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

      - name: Tests + Coverage
        run: |
          THRESHOLD=$(cat .coverage-threshold)
          pytest tests/ --ignore=tests/test_intent.py \
            --cov=hal --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=$THRESHOLD \
            --junitxml=junit-results.xml \
            -q --no-header

      - name: Doc-drift check
        run: python scripts/check_doc_drift.py

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            junit-results.xml
            coverage.xml
