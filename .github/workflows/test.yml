name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        # Creates .venv so all Makefile targets (which use .venv/bin/) work unchanged.
        # azure-ai-evaluation is excluded — eval-only, heavy, run manually on server.
        # intent tests (test_intent.py) are excluded — require a live Ollama instance.
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          grep -v "azure-ai-evaluation" requirements-dev.txt | .venv/bin/pip install -r /dev/stdin

      - name: Lint
        run: make lint

      - name: Format check
        run: .venv/bin/ruff format --check .

      - name: Type check (warn-only)
        run: make typecheck
        continue-on-error: true

      - name: Markdown lint (warn-only until backlog item 6 is resolved)
        run: make lint-md
        continue-on-error: true

      - name: Test (offline — all 530 tests)
        run: make test
