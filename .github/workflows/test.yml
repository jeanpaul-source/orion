name: CI

on:
  push:
    branches: ["*"]        # every branch, not just main
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Audit dependencies
        run: pip-audit

      - name: Ruff lint
        run: ruff check --output-format=github hal/ tests/ harvest/ eval/

      - name: Ruff format
        run: ruff format --check hal/ tests/ harvest/ eval/

      - name: Mypy
        run: mypy hal/

      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !notes/**
            !.venv/**

      - name: Tests + Coverage
        run: |
          THRESHOLD=$(cat .coverage-threshold)
          pytest tests/ --ignore=tests/test_intent.py \
            --cov=hal --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=$THRESHOLD \
            --junitxml=junit-results.xml \
            -q --no-header

      - name: Doc-drift check
        run: python scripts/check_doc_drift.py

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            junit-results.xml
            coverage.xml
