name: Deploy to the-lab

# Trigger: runs after "Build and push image" completes successfully on main.
# This replaces the old push-to-main trigger — we deploy images, not source code.
on:
  workflow_run:
    workflows: ["Build and push image"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to the-lab
    # Only deploy if the build workflow succeeded (not on failure/cancellation).
    if: github.event.workflow_run.conclusion == 'success'
    # runs-on: self-hosted means this job runs on OUR server via the self-hosted runner,
    # not on GitHub's cloud machines. The runner process polls GitHub and picks up the job.
    runs-on: self-hosted

    steps:
      # Step 1: Pull the latest image from GHCR.
      # The repo is public, so no authentication is needed for pulls.
      - name: Pull latest image
        run: |
          docker pull ghcr.io/jeanpaul-source/orion:latest

      # Step 2: Recreate the container with the new image.
      # docker compose up -d detects that the image changed and recreates
      # the container automatically. Other services are untouched.
      - name: Restart container
        run: |
          cd ~/orion
          docker compose up -d

      # Step 3: Show the last 20 lines of container logs.
      # if: always() means this runs even if a previous step failed,
      # so you always have visibility into the container's current state.
      - name: Show container logs
        if: always()
        run: |
          docker logs --tail 20 orion
