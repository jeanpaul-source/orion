name: Deploy to the-lab

# Trigger: runs after "Build and push image" completes successfully on main.
# This replaces the old push-to-main trigger — we deploy images, not source code.
on:
  workflow_run:
    workflows: ["Build and push image"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to the-lab
    # Only deploy if the build workflow succeeded (not on failure/cancellation).
    if: github.event.workflow_run.conclusion == 'success'
    # runs-on: self-hosted means this job runs on OUR server via the self-hosted runner,
    # not on GitHub's cloud machines. The runner process polls GitHub and picks up the job.
    runs-on: self-hosted

    steps:
      # Step 1: Pull the latest image from GHCR.
      # The repo is public, so no authentication is needed for pulls.
      - name: Pull latest image
        run: |
          docker pull ghcr.io/jeanpaul-source/orion:latest

      # Step 2: Recreate the container with the new image.
      # docker compose up -d detects that the image changed and recreates
      # the container automatically. Other services are untouched.
      - name: Restart container
        run: |
          cd ~/orion
          docker compose up -d

      # Step 3: Wait for Docker's built-in healthcheck to report "healthy".
      # The container has start_period: 120s + 3 retries × 30s = up to ~210s
      # before Docker marks it healthy. We poll for 250s (50 × 5s) to give
      # headroom. If it never becomes healthy, we dump logs and fail the run.
      - name: Wait for healthy container
        run: |
          echo "Waiting for container to become healthy..."
          for i in $(seq 1 50); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' orion 2>/dev/null || echo "unknown")
            echo "  Attempt $i/50: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Container did not become healthy within 250 seconds"
          docker logs --tail 50 orion
          exit 1

      # Step 4: Show the last 20 lines of container logs.
      # if: always() means this runs even if a previous step failed,
      # so you always have visibility into the container's current state.
      - name: Show container logs
        if: always()
        run: |
          docker logs --tail 20 orion

      # Step 5: Send a push notification via ntfy if anything failed.
      # The || true at the end prevents a notification failure from masking
      # the real deploy failure. NTFY_URL is a GitHub repository secret.
      - name: Notify on failure
        if: failure()
        run: |
          curl -s \
            -H "Title: Orion deploy failed" \
            -H "Priority: high" \
            -H "Tags: rotating_light" \
            -d "Deploy of ${{ github.event.workflow_run.head_sha }} failed. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "${{ secrets.NTFY_URL }}" || true
