[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
# Rule sets — each group serves a specific purpose:
#   E4/E7/E9 — pycodestyle errors (syntax, indentation, runtime)
#   W        — pycodestyle warnings (trailing whitespace, blank lines)
#   F        — pyflakes (unused imports, undefined names)
#   I        — isort (import ordering)
#   A        — flake8-builtins (catches shadowing of Python builtins like id, type, list)
#   B        — bugbear (common Python gotchas: mutable defaults, assert in except, etc.)
#   UP       — pyupgrade (modernize to Python 3.12 idioms)
#   SIM      — simplify (collapse redundant if/with/try patterns)
#   RUF      — ruff-specific (unused noqa, mutable class attrs, ambiguous unicode)
#   C4       — comprehensions (simplify list/dict/set construction)
#   DTZ      — datetime timezone safety (no naive datetimes)
#   ISC      — implicit string concat (catches accidental "a" "b" → "ab")
#   PIE      — misc code quality (no unnecessary pass, deduplicate isinstance)
#   PLE      — pylint errors (actual code errors: bad super calls, invalid exceptions)
#   PERF     — performance (avoid unnecessary copies, use comprehensions)
#   PT       — pytest best practices (fixture style, parametrize format)
#   RET      — return statements (unnecessary else after return)
#   S        — bandit security (subprocess, SQL injection, XML, silent exceptions)
#   T20      — print statements (enforce structured logging in production code)
select = [
    "E4", "E7", "E9", "W", "F", "I",
    "A", "B", "UP", "SIM", "RUF", "C4",
    "DTZ", "ISC", "PIE", "PLE", "PERF",
    "PT", "RET", "S", "T20",
]

# Rule groups evaluated and intentionally excluded (audited 2026-03-07):
#   TCH  — type-checking imports: moves imports into TYPE_CHECKING blocks;
#          fragile (can break runtime), marginal benefit for this project size (31 hits)
#   ARG  — unused arguments: 273 hits, overwhelmingly test mocks/fixture lambdas
#   ERA  — commented-out code: 35 hits, high false-positive rate on structured comments
#   FBT  — boolean trap: 16 hits, stylistic preference not a correctness issue
#   N    — naming conventions: 7 hits, all import alias conventions (e.g. camelCase libs)
#   PLC  — pylint convention: 123 hits, all import-outside-top-level (deferred imports
#          are intentional throughout this project for startup performance)
#   PLR  — pylint refactor: 240 hits, 192 are magic-value-comparison; rest is function
#          complexity thresholds that don't map to real problems here
#   PLW  — pylint warning: 19 hits, subprocess-run-without-check already covered by S rules

[tool.ruff.format]
# Defaults match black: double quotes, 88-char line length, trailing commas.
# Explicit section makes intent clear and allows future overrides.

[tool.ruff.lint.per-file-ignores]
# server.py manipulates sys.path before importing hal.* (required when run
# directly as a script).  E402 = module-level import not at top of file;
# I001 = isort treats the sys.path block as separating two import groups.
"hal/server.py" = ["E402", "I001"]
# harvest/ and eval/ are CLI tools — print() is their correct output mechanism.
# scripts/ likewise uses print for user-facing output.
"harvest/**" = ["T20"]
"eval/**" = ["T20"]
"scripts/**" = ["T20"]
# Test files: pytest fixtures and parametrize have their own conventions;
# subprocess calls in tests are mocked, not real security concerns.
# S101 = assert is how pytest works — ONLY allowed here, not in production code.
# S108 = mock /tmp paths; S106 = test tokens/passwords;
# S104 = test assertions about bind addresses.
"tests/**" = ["S101", "S104", "S106", "S108", "S603", "S607"]
# CJK test data files contain intentional fullwidth Unicode characters —
# these ARE the test data, not ambiguous typos.  RUF001 = ambiguous
# Unicode in strings; RUF002 = ambiguous Unicode in docstrings.
"tests/test_sanitize.py" = ["RUF001", "RUF002"]
"tests/test_memory.py" = ["RUF001"]

[tool.mypy]
python_version = "3.12"
# Suppress errors from third-party libs that don't ship stubs (fastapi, opentelemetry, etc.)
ignore_missing_imports = true
# Check function bodies even when they have no annotations
check_untyped_defs = true
# Require type annotations on all function definitions
disallow_untyped_defs = true
# Require annotations on decorated functions
disallow_untyped_decorators = true
# Don't allow partially-annotated function defs
disallow_incomplete_defs = true
# Disallow subclassing values of type Any
disallow_subclassing_any = true
# Warn when a function returns Any from a typed return
warn_return_any = true
# Warn about stale # type: ignore comments
warn_unused_ignores = true
# Warn about redundant cast() calls
warn_redundant_casts = true
# Require explicit re-export (use __all__ or redundant alias)
no_implicit_reexport = true
# Prohibit equality checks on incompatible types
strict_equality = true
# Enable additional checks (e.g. missing return, redundant expressions)
extra_checks = true

# Flag evaluated and intentionally excluded (audited 2026-03-07):
#   disallow_any_generics — 76 violations; would require replacing all dict[str, Any]
#   with dict[str, object] or TypedDict; high churn, marginal safety improvement.
#   This can be revisited when the codebase has fewer Any-typed boundaries.

[tool.coverage.run]
# Write coverage data to /tmp so the pre-push hook doesn't see "files modified"
data_file = "/tmp/.coverage-orion"
