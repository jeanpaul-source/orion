<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORION - AI Homelab Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <span class="logo-icon">🌌</span>
                    <span class="logo-text">ORION</span>
                </h1>
                <p class="subtitle">AI Homelab Assistant</p>
            </div>
            <div class="status-indicator">
                <span id="statusDot" class="status-dot status-connecting"></span>
                <span id="statusText" class="status-text">Connecting...</span>
            </div>
        </header>

        <!-- Chat Container -->
        <div class="chat-container">
            <div id="messages" class="messages">
                <!-- Messages will be added here dynamically -->
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-container">
            <div class="input-wrapper">
                <input
                    type="text"
                    id="messageInput"
                    class="message-input"
                    placeholder="Ask ORION anything in natural language..."
                    autocomplete="off"
                    autofocus
                />
                <button id="sendButton" class="send-button" disabled>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
            <div class="input-hint">
                💡 Try: "What's my system status?" or "Explain Kubernetes StatefulSets"
            </div>
        </div>
    </div>

    <!-- Loading indicator -->
    <div id="loadingIndicator" class="loading-indicator hidden">
        <div class="loading-spinner"></div>
        <span>ORION is thinking...</span>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
