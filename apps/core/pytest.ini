[pytest]
# Configure pytest for ORION Core tests
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add src to Python path so tests can import modules
pythonpath = src

# Asyncio configuration for async tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Output configuration
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes

# Markers
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    unit: marks tests as unit tests
    smoke: marks tests as smoke tests (quick service reachability checks)
    real: marks tests that call live services with no mocks (requires lab stack)
    e2e: marks tests as end-to-end browser tests with Playwright
    slow: marks tests as slow (deselect with '-m "not slow"')
