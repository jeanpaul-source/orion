# ORION Core - Docker Compose Configuration
#
# This service integrates with the existing ORION stack.
# Add this to your main docker-compose.yml on the lab host.

version: '3.8'

services:
  orion-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orion-core
    restart: unless-stopped

    # Expose web UI to network
    ports:
      - "0.0.0.0:5000:5000"

    # Environment configuration
    environment:
      # Application
      - ORION_ENVIRONMENT=production
      - ORION_LOG_LEVEL=INFO

      # Service URLs (Docker internal network)
      - ORION_VLLM_URL=http://vllm:8000
      - ORION_QDRANT_URL=http://qdrant:6333
      - ORION_ANYTHINGLLM_URL=http://anythingllm:3001
      - ORION_OLLAMA_URL=http://host.docker.internal:11434
      - ORION_N8N_URL=http://n8n:5678

      # API Keys
      - ORION_ANYTHINGLLM_API_KEY=${ANYTHINGLLM_API_KEY}

      # DevOps Agent (Action subsystem)
      - DEVIA_VLLM_URL=http://vllm:8000/v1
      - DEVIA_VLLM_MODEL=Qwen/Qwen2.5-14B-Instruct-AWQ
      - DEVIA_VLLM_API_KEY=${VLLM_API_KEY}

      # Features
      - ORION_ENABLE_KNOWLEDGE=true
      - ORION_ENABLE_ACTION=true
      - ORION_ENABLE_LEARNING=true
      - ORION_ENABLE_WATCH=true
      - ORION_ENABLE_TRACING=true
      - ORION_TRACING_ENDPOINT=${ORION_TRACING_ENDPOINT:-http://host.docker.internal:4318/v1/traces}

    # Data persistence
    volumes:
      - /mnt/nvme1/orion-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro  # For Docker control

    # Security - Allow socket operations for asyncio event loop
    # Note: privileged mode required for asyncio socket creation on this Docker version
    privileged: true

    # Network
    networks:
      - orion-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Log rotation (prevent unbounded growth)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"      # Max 10MB per log file
        max-file: "3"        # Keep 3 files (30MB total)
        compress: "true"     # Compress rotated logs

networks:
  orion-net:
    external: true  # Use existing network from infrastructure stack
