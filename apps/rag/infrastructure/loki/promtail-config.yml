# Promtail Configuration for ORION Homelab
# Log collection agent that ships logs to Loki

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

# Loki client configuration
clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

positions:
  filename: /tmp/positions.yaml

# Scrape configurations
scrape_configs:
  # =========================================================================
  # DOCKER CONTAINER LOGS
  # =========================================================================
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      # Only scrape containers in orion-net network
      - source_labels: ['__meta_docker_network_name']
        regex: 'orion-net'
        action: keep

      # Extract container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'

      # Extract service name from container name (orion-core, vllm, etc.)
      - source_labels: ['__meta_docker_container_name']
        regex: '/orion-(.*)'
        target_label: 'service'
        replacement: '${1}'

      # Add service label for non-orion containers
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

      # Add compose project label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'compose_project'

      # Add image name
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'

      # Add environment label
      - replacement: 'production'
        target_label: 'environment'

      # Add cluster label
      - replacement: 'orion-homelab'
        target_label: 'cluster'

    pipeline_stages:
      # Parse JSON logs
      - json:
          expressions:
            level: level
            message: message
            timestamp: timestamp
            logger: logger
            user_id: user_id
            session_id: session_id
            request_id: request_id
            status_code: status_code
            method: method
            path: path
            duration: duration

      # Extract log level from various formats
      - regex:
          expression: '(?P<level>DEBUG|INFO|WARN|WARNING|ERROR|CRITICAL|FATAL)'
          source: message

      # Set log level label
      - labels:
          level:
          logger:
          service:
          container:

      # Parse timestamps
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - Unix

      # Drop debug logs for non-critical services (optional)
      # - drop:
      #     expression: '.*DEBUG.*'
      #     source: level
      #     older_than: 24h

  # =========================================================================
  # SYSTEM LOGS (journald)
  # =========================================================================
  - job_name: systemd
    journal:
      max_age: 12h
      labels:
        job: systemd
        environment: production
        cluster: orion-homelab

    relabel_configs:
      # Extract systemd unit name
      - source_labels: ['__journal__systemd_unit']
        target_label: 'unit'

      # Extract priority (log level)
      - source_labels: ['__journal_priority']
        target_label: 'priority'

      # Only include docker and system critical logs
      - source_labels: ['__journal__systemd_unit']
        regex: '(docker|ssh|cron|systemd).*'
        action: keep

    pipeline_stages:
      # Map syslog priority to log level
      - labels:
          priority:
          unit:

  # =========================================================================
  # ORION CORE AUDIT LOGS (structured logging)
  # =========================================================================
  - job_name: orion-audit
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: [orion-core]

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container'
      - replacement: 'orion-core'
        target_label: 'service'
      - replacement: 'audit'
        target_label: 'log_type'

    pipeline_stages:
      # Parse structured JSON logs from ORION
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            event_type: event_type
            user_id: user_id
            session_id: session_id
            action: action
            resource: resource
            result: result
            ip_address: ip_address
            user_agent: user_agent

      # Create labels for querying
      - labels:
          level:
          event_type:
          action:
          result:
          service:

      # Parse timestamp
      - timestamp:
          source: timestamp
          format: RFC3339Nano

      # Add audit flag
      - static_labels:
          audit: 'true'

  # =========================================================================
  # TRAEFIK ACCESS LOGS
  # =========================================================================
  - job_name: traefik-access
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: [traefik]

    relabel_configs:
      - replacement: 'traefik'
        target_label: 'service'
      - replacement: 'access'
        target_label: 'log_type'

    pipeline_stages:
      # Parse Traefik access logs (common log format)
      - regex:
          expression: '^(?P<remote_addr>[\w\.]+) - (?P<remote_user>[^ ]*) \[(?P<time_local>.*)\] "(?P<method>\w+) (?P<path>[^ ]*) HTTP/[^"]*" (?P<status>\d+) (?P<body_bytes_sent>\d+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)"'

      # Create labels
      - labels:
          method:
          status:
          service:

      # Parse timestamp
      - timestamp:
          source: time_local
          format: '02/Jan/2006:15:04:05 -0700'

  # =========================================================================
  # AUTHELIA LOGS (authentication events)
  # =========================================================================
  - job_name: authelia
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: [authelia]

    relabel_configs:
      - replacement: 'authelia'
        target_label: 'service'
      - replacement: 'auth'
        target_label: 'log_type'

    pipeline_stages:
      # Parse Authelia JSON logs
      - json:
          expressions:
            level: level
            message: msg
            time: time
            method: method
            path: path
            remote_ip: remote_ip
            status: status
            username: username

      - labels:
          level:
          method:
          status:
          username:
          service:

      - timestamp:
          source: time
          format: RFC3339

  # =========================================================================
  # TELEGRAM BOT LOGS (Phase 4)
  # =========================================================================
  - job_name: telegram-bot
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: [orion-core]

    relabel_configs:
      - replacement: 'telegram-bot'
        target_label: 'component'
      - replacement: 'orion-core'
        target_label: 'service'

    pipeline_stages:
      # Filter only telegram-related logs
      - match:
          selector: '{service="orion-core"} |~ "telegram"'
          stages:
            - json:
                expressions:
                  user_id: user_id
                  command: command
                  message: message

            - labels:
                command:
                component:
