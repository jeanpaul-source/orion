# ORION Infrastructure - Phase 2: Authelia SSO Extension
# Usage: docker compose -f docker-compose.traefik.yml -f docker-compose.authelia.yml up -d
#
# This file adds Authelia SSO and updates service labels to use authentication
# Requires docker-compose.traefik.yml as the base

services:
  # -- Redis (Session Storage for Authelia) --
  redis:
    image: redis:7.2-alpine
    container_name: orion-redis
    restart: unless-stopped

    # Internal only
    expose:
      - "6379"

    volumes:
      - /mnt/nvme2/orion-project/services/redis:/data

    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3

    networks:
      - orion-net

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "2"

  # -- Authelia SSO --
  authelia:
    image: authelia/authelia:4.38
    container_name: orion-authelia
    restart: unless-stopped

    # Internal only (accessed via Traefik)
    expose:
      - "9091"    # Main service
      - "9959"    # Metrics endpoint

    volumes:
      # Configuration
      - ./authelia/configuration.yml:/config/configuration.yml:ro
      - ./authelia/users_database.yml:/config/users_database.yml:ro

      # Persistent data
      - /mnt/nvme2/orion-project/services/authelia:/config

      # Logs
      - /mnt/nvme2/orion-project/logs/authelia:/var/log/authelia

    environment:
      - TZ=America/New_York
      - AUTHELIA_JWT_SECRET=${AUTHELIA_JWT_SECRET}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}

    depends_on:
      redis:
        condition: service_healthy

    networks:
      - orion-net

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

    labels:
      # Enable Traefik
      - "traefik.enable=true"

      # Authelia web UI
      - "traefik.http.routers.authelia.rule=Host(`orion.lab`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.authelia.entrypoints=websecure"
      - "traefik.http.routers.authelia.tls=true"
      - "traefik.http.routers.authelia.middlewares=security-headers"
      - "traefik.http.services.authelia.loadbalancer.server.port=9091"

      # Metrics endpoint (Prometheus)
      - "traefik.http.routers.authelia-metrics.rule=Host(`orion.lab`) && PathPrefix(`/authelia-metrics`)"
      - "traefik.http.routers.authelia-metrics.entrypoints=websecure"
      - "traefik.http.routers.authelia-metrics.tls=true"
      - "traefik.http.routers.authelia-metrics.middlewares=lan-only"
      - "traefik.http.services.authelia-metrics.loadbalancer.server.port=9959"

  # -- Update existing services to use Authelia --

  # AnythingLLM - Add SSO
  anythingllm:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.anythingllm.rule=Host(`orion.lab`) && PathPrefix(`/knowledge`)"
      - "traefik.http.routers.anythingllm.entrypoints=websecure"
      - "traefik.http.routers.anythingllm.tls=true"
      # UPDATED: Add Authelia middleware
      - "traefik.http.routers.anythingllm.middlewares=authelia-basic,security-headers,compression"
      - "traefik.http.services.anythingllm.loadbalancer.server.port=3001"

  # n8n - Add SSO
  n8n:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`orion.lab`) && PathPrefix(`/workflows`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls=true"
      # UPDATED: Add Authelia middleware
      - "traefik.http.routers.n8n.middlewares=authelia-basic,security-headers,compression"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

  # Grafana - Add SSO
  grafana:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`orion.lab`) && PathPrefix(`/metrics`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      # UPDATED: Add Authelia middleware
      - "traefik.http.routers.grafana.middlewares=authelia-basic,security-headers,compression"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  # Traefik Dashboard - Replace basic auth with Authelia
  traefik:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`orion.lab`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.service=api@internal"
      # UPDATED: Replace dashboard-auth with authelia (requires MFA)
      - "traefik.http.routers.dashboard.middlewares=lan-only,authelia"

  # Prometheus - Add SSO
  prometheus:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`orion.lab`) && PathPrefix(`/prometheus`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls=true"
      # UPDATED: Add Authelia middleware (MFA required for metrics)
      - "traefik.http.routers.prometheus.middlewares=lan-only,authelia,security-headers"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  # ORION Core API - Optional auth (can be bypass or authelia-basic)
  orion-core:
    labels:
      - "traefik.enable=true"

      # Main web interface (public - no auth)
      - "traefik.http.routers.orion-web.rule=Host(`orion.lab`) && PathPrefix(`/`)"
      - "traefik.http.routers.orion-web.entrypoints=websecure"
      - "traefik.http.routers.orion-web.tls=true"
      - "traefik.http.routers.orion-web.middlewares=security-headers,compression"
      - "traefik.http.routers.orion-web.priority=1"

      # API endpoint (optional: add authelia-basic if you want auth)
      - "traefik.http.routers.orion-api.rule=Host(`orion.lab`) && PathPrefix(`/api`)"
      - "traefik.http.routers.orion-api.entrypoints=websecure"
      - "traefik.http.routers.orion-api.tls=true"
      - "traefik.http.routers.orion-api.middlewares=security-headers,cors-headers,rate-limit"
      - "traefik.http.routers.orion-api.priority=10"

      - "traefik.http.services.orion-core.loadbalancer.server.port=5000"

networks:
  orion-net:
    external: true
