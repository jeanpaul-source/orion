# Docker Compose Overlay for Phase 6: Centralized Audit Logging
#
# This overlay adds centralized logging with Loki and Promtail:
# - Loki (log aggregation and storage)
# - Promtail (log collector from Docker containers)
# - Grafana datasource for Loki (auto-provisioned)
#
# Usage:
#   docker compose -f docker-compose.traefik.yml \
#                  -f docker-compose.authelia.yml \
#                  -f docker-compose.alerting.yml \
#                  -f docker-compose.logging.yml \
#                  up -d

services:
  # ===========================================================================
  # LOKI - Log Aggregation
  # ===========================================================================
  loki:
    image: grafana/loki:3.0.0
    container_name: orion-loki
    restart: unless-stopped

    command: -config.file=/etc/loki/loki-config.yml

    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - /mnt/nvme2/orion-project/services/loki:/loki

    expose:
      - "3100"  # HTTP API
      - "9096"  # gRPC

    networks:
      - orion-net

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    labels:
      - "traefik.enable=true"
      
      # HTTP router
      - "traefik.http.routers.loki.rule=Host(`orion.lab`) && PathPrefix(`/loki`)"
      - "traefik.http.routers.loki.entrypoints=websecure"
      - "traefik.http.routers.loki.tls=true"
      - "traefik.http.routers.loki.middlewares=authelia@file"
      
      # Service
      - "traefik.http.services.loki.loadbalancer.server.port=3100"

  # ===========================================================================
  # PROMTAIL - Log Collector
  # ===========================================================================
  promtail:
    image: grafana/promtail:3.0.0
    container_name: orion-promtail
    restart: unless-stopped

    command: -config.file=/etc/promtail/promtail-config.yml

    volumes:
      - ./loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro

    networks:
      - orion-net

    depends_on:
      - loki

    labels:
      - "traefik.enable=false"

  # ===========================================================================
  # UPDATED SERVICES
  # ===========================================================================

  # Grafana - Add Loki datasource
  grafana:
    volumes:
      # Add Loki datasource provisioning
      - ./grafana/provisioning/datasources/loki.yml:/etc/grafana/provisioning/datasources/loki.yml:ro

networks:
  orion-net:
    external: true
