# Grafana AlertManager Configuration
# Defines notification channels, routing, and alert handling

apiVersion: 1

# Notification Templates
templates:
  - /etc/grafana/alerting/templates/*.tmpl

# Alert Routing Tree
route:
  # Root receiver (default for unmatched alerts)
  receiver: 'default'

  # Group alerts by these labels
  group_by: ['alertname', 'service', 'severity']

  # Wait time before sending first notification
  group_wait: 30s

  # Wait time before sending notification about new alerts in group
  group_interval: 5m

  # Wait time before re-sending notification
  repeat_interval: 3h

  # Child routes with specific matching rules
  routes:
    # Critical alerts → Immediate Telegram + Email
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 30m
      continue: false  # Stop processing after match

    # Warning alerts → Telegram only
    - match:
        severity: warning
      receiver: 'telegram'
      group_wait: 1m
      group_interval: 10m
      repeat_interval: 6h
      continue: false

    # Info alerts → Log only (no notification)
    - match:
        severity: info
      receiver: 'null'
      continue: false

    # Service-specific routing
    - match:
        service: orion-core
      receiver: 'orion-team'
      routes:
        - match:
            severity: critical
          receiver: 'critical-alerts'

    - match:
        service: vllm
      receiver: 'gpu-alerts'
      routes:
        - match:
            severity: critical
          receiver: 'critical-alerts'

    - match:
        service: qdrant
      receiver: 'database-alerts'
      routes:
        - match:
            severity: critical
          receiver: 'critical-alerts'

# Inhibition Rules
# Suppress alerts when related alerts are firing
inhibit_rules:
  # Suppress warning if critical is firing for same service
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['service', 'instance']

  # Suppress info if warning is firing for same service
  - source_match:
      severity: 'warning'
    target_match:
      severity: 'info'
    equal: ['service', 'instance']

  # Suppress disk space warning if service is down
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '(DiskSpaceLow|HighMemoryUsage)'
    equal: ['instance']

# Receivers (Notification Channels)
receivers:
  # Default receiver (fallback)
  - name: 'default'
    telegram_configs:
      - bot_token: '{{ env "GRAFANA_TELEGRAM_BOT_TOKEN" }}'
        chat_id: '{{ env "GRAFANA_TELEGRAM_CHAT_ID" }}'
        parse_mode: 'HTML'
        message: '{{ template "telegram.default.message" . }}'
        disable_notifications: false

  # Critical alerts → Multiple channels
  - name: 'critical-alerts'
    telegram_configs:
      - bot_token: '{{ env "GRAFANA_TELEGRAM_BOT_TOKEN" }}'
        chat_id: '{{ env "GRAFANA_TELEGRAM_CHAT_ID" }}'
        parse_mode: 'HTML'
        message: '{{ template "telegram.critical.message" . }}'
        disable_notifications: false

    email_configs:
      - to: '{{ env "ALERT_EMAIL_TO" }}'
        from: '{{ env "ALERT_EMAIL_FROM" }}'
        smarthost: '{{ env "SMTP_HOST" }}:{{ env "SMTP_PORT" }}'
        auth_username: '{{ env "SMTP_USERNAME" }}'
        auth_password: '{{ env "SMTP_PASSWORD" }}'
        headers:
          Subject: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        html: '{{ template "email.critical.html" . }}'

    webhook_configs:
      - url: 'http://orion-core:5000/api/alerts/webhook'
        send_resolved: true
        http_config:
          follow_redirects: true
        max_alerts: 10

  # Telegram only (warnings)
  - name: 'telegram'
    telegram_configs:
      - bot_token: '{{ env "GRAFANA_TELEGRAM_BOT_TOKEN" }}'
        chat_id: '{{ env "GRAFANA_TELEGRAM_CHAT_ID" }}'
        parse_mode: 'HTML'
        message: '{{ template "telegram.warning.message" . }}'
        disable_notifications: false

  # ORION Core team
  - name: 'orion-team'
    telegram_configs:
      - bot_token: '{{ env "GRAFANA_TELEGRAM_BOT_TOKEN" }}'
        chat_id: '{{ env "GRAFANA_TELEGRAM_CHAT_ID" }}'
        parse_mode: 'HTML'
        message: '{{ template "telegram.orion.message" . }}'

  # GPU-specific alerts
  - name: 'gpu-alerts'
    telegram_configs:
      - bot_token: '{{ env "GRAFANA_TELEGRAM_BOT_TOKEN" }}'
        chat_id: '{{ env "GRAFANA_TELEGRAM_CHAT_ID" }}'
        parse_mode: 'HTML'
        message: '{{ template "telegram.gpu.message" . }}'

  # Database alerts
  - name: 'database-alerts'
    telegram_configs:
      - bot_token: '{{ env "GRAFANA_TELEGRAM_BOT_TOKEN" }}'
        chat_id: '{{ env "GRAFANA_TELEGRAM_CHAT_ID" }}'
        parse_mode: 'HTML'
        message: '{{ template "telegram.database.message" . }}'

  # Null receiver (discard)
  - name: 'null'

# Time intervals for muting
time_intervals:
  # Business hours (for non-critical alerts)
  - name: 'business-hours'
    time_intervals:
      - times:
          - start_time: '09:00'
            end_time: '17:00'
        weekdays: ['monday:friday']
        location: 'America/New_York'

  # Off-hours
  - name: 'off-hours'
    time_intervals:
      - times:
          - start_time: '17:00'
            end_time: '09:00'
        weekdays: ['monday:friday']
      - weekdays: ['saturday', 'sunday']

  # Maintenance window
  - name: 'maintenance'
    time_intervals:
      - times:
          - start_time: '02:00'
            end_time: '04:00'
        weekdays: ['sunday']

# Mute time intervals (apply silences during these times)
mute_time_intervals:
  # Don't send info alerts during business hours
  - name: 'info-business-hours'
    matchers:
      - severity="info"
    time_intervals:
      - 'business-hours'

  # Don't send any alerts during maintenance
  - name: 'maintenance-window'
    time_intervals:
      - 'maintenance'
