# Grafana Datasource: Loki (Phase 6)
# Auto-provisioned log aggregation datasource

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    version: 1
    editable: false
    isDefault: false

    jsonData:
      # Maximum number of lines to display
      maxLines: 1000
      
      # Derived fields (extract links from logs)
      derivedFields:
        # Extract trace IDs and link to traces (if using Tempo)
        - name: TraceID
          matcherRegex: "trace_id=(\\w+)"
          url: "$${__value.raw}"
          urlDisplayLabel: "View Trace"

        # Extract request IDs for correlation
        - name: RequestID
          matcherRegex: "request_id=([\\w-]+)"
          url: "/d/requests?var-request_id=$${__value.raw}"
          urlDisplayLabel: "View Request"

      # Alert on logs
      alerting: true

      # Timeout for queries
      timeout: 60

    # Optional: Basic auth (if Loki has auth enabled)
    # basicAuth: false
    # basicAuthUser: admin
    # secureJsonData:
    #   basicAuthPassword: password
