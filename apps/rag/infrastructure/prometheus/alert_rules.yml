# Prometheus Alert Rules for ORION Homelab
# These rules define when alerts should be triggered

groups:
  # ============================================================================
  # ORION Core Service Alerts
  # ============================================================================
  - name: orion_core_alerts
    interval: 30s
    rules:
      # Service down
      - alert: ORIONCoreDown
        expr: up{job="orion-core"} == 0
        for: 1m
        labels:
          severity: critical
          service: orion-core
          component: core
        annotations:
          summary: "ORION Core service is down"
          description: "ORION Core has been unreachable for more than 1 minute. All AI functionality is unavailable."
          runbook_url: "https://orion.lab/docs/runbooks/orion-core-down"
          current_value: "{{ $value }}"

      # High error rate
      - alert: ORIONHighErrorRate
        expr: rate(orion_errors_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
          service: orion-core
          component: core
        annotations:
          summary: "High error rate in ORION Core"
          description: "ORION Core is experiencing {{ $value | humanize }} errors per second."
          current_value: "{{ $value | humanize }}/s"
          threshold: "10/s"

      # Response time degradation
      - alert: ORIONSlowResponses
        expr: histogram_quantile(0.95, rate(orion_request_duration_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
          service: orion-core
          component: core
        annotations:
          summary: "ORION Core response time degraded"
          description: "95th percentile response time is {{ $value | humanize }}s (threshold: 10s)"
          current_value: "{{ $value | humanize }}s"
          threshold: "10s"

      # Queue backlog
      - alert: ORIONQueueBacklog
        expr: orion_queue_size > 50
        for: 3m
        labels:
          severity: warning
          service: orion-core
          component: queue
        annotations:
          summary: "ORION request queue is growing"
          description: "Request queue has {{ $value }} pending requests. System may be overloaded."
          current_value: "{{ $value }}"
          threshold: "50"

  # ============================================================================
  # vLLM (GPU) Service Alerts
  # ============================================================================
  - name: vllm_alerts
    interval: 30s
    rules:
      # Service down
      - alert: vLLMDown
        expr: up{job="vllm"} == 0
        for: 2m
        labels:
          severity: critical
          service: vllm
          component: llm
        annotations:
          summary: "vLLM service is down"
          description: "vLLM (GPU inference) has been down for 2+ minutes. LLM capabilities unavailable."
          runbook_url: "https://orion.lab/docs/runbooks/vllm-down"

      # GPU temperature high
      - alert: GPUTemperatureHigh
        expr: nvidia_gpu_temperature_celsius > 80
        for: 2m
        labels:
          severity: warning
          service: vllm
          component: gpu
        annotations:
          summary: "GPU temperature is high"
          description: "GPU temperature is {{ $value }}°C (threshold: 80°C). Check cooling."
          current_value: "{{ $value }}°C"
          threshold: "80°C"
          gpu_temp: "{{ $value }}°C"

      # GPU temperature critical
      - alert: GPUTemperatureCritical
        expr: nvidia_gpu_temperature_celsius > 85
        for: 1m
        labels:
          severity: critical
          service: vllm
          component: gpu
        annotations:
          summary: "GPU temperature is critically high"
          description: "GPU temperature is {{ $value }}°C (critical threshold: 85°C). Immediate action required!"
          current_value: "{{ $value }}°C"
          threshold: "85°C"
          gpu_temp: "{{ $value }}°C"

      # GPU memory high
      - alert: GPUMemoryHigh
        expr: (nvidia_gpu_memory_used_bytes / nvidia_gpu_memory_total_bytes) > 0.90
        for: 5m
        labels:
          severity: warning
          service: vllm
          component: gpu
        annotations:
          summary: "GPU memory usage is high"
          description: "GPU memory is {{ $value | humanizePercentage }} full."
          current_value: "{{ $value | humanizePercentage }}"
          threshold: "90%"
          gpu_memory: "{{ $value | humanizePercentage }}"

      # Model loading failed
      - alert: vLLMModelLoadFailed
        expr: increase(vllm_model_load_errors_total[10m]) > 0
        labels:
          severity: critical
          service: vllm
          component: model
        annotations:
          summary: "vLLM failed to load model"
          description: "Model loading has failed {{ $value }} times in the last 10 minutes."
          current_value: "{{ $value }}"

  # ============================================================================
  # Qdrant (Vector Database) Alerts
  # ============================================================================
  - name: qdrant_alerts
    interval: 30s
    rules:
      # Service down
      - alert: QdrantDown
        expr: up{job="qdrant"} == 0
        for: 2m
        labels:
          severity: critical
          service: qdrant
          component: database
        annotations:
          summary: "Qdrant vector database is down"
          description: "Qdrant has been unreachable for 2+ minutes. RAG queries will fail."
          runbook_url: "https://orion.lab/docs/runbooks/qdrant-down"

      # Collection empty
      - alert: QdrantCollectionEmpty
        expr: qdrant_collection_points_count{collection="orion_homelab"} == 0
        for: 5m
        labels:
          severity: critical
          service: qdrant
          component: database
        annotations:
          summary: "Qdrant collection is empty"
          description: "The orion_homelab collection has no vectors. Knowledge base is unavailable."
          collection: "orion_homelab"
          vector_count: "0"

      # High search latency
      - alert: QdrantSlowSearches
        expr: histogram_quantile(0.95, rate(qdrant_search_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: qdrant
          component: search
        annotations:
          summary: "Qdrant search latency is high"
          description: "95th percentile search time is {{ $value | humanize }}s (threshold: 2s)"
          current_value: "{{ $value | humanize }}s"
          threshold: "2s"

  # ============================================================================
  # Authelia (SSO) Alerts
  # ============================================================================
  - name: authelia_alerts
    interval: 30s
    rules:
      # Service down
      - alert: AutheliaDown
        expr: up{job="authelia"} == 0
        for: 2m
        labels:
          severity: critical
          service: authelia
          component: auth
        annotations:
          summary: "Authelia SSO is down"
          description: "Authentication service is unavailable. Users cannot log in."
          runbook_url: "https://orion.lab/docs/runbooks/authelia-down"

      # High authentication failures
      - alert: AutheliaHighFailures
        expr: rate(authelia_authentication_failure_total[5m]) > 5
        for: 3m
        labels:
          severity: warning
          service: authelia
          component: auth
        annotations:
          summary: "High authentication failure rate"
          description: "{{ $value | humanize }} authentication failures per second. Possible brute-force attack."
          current_value: "{{ $value | humanize }}/s"
          threshold: "5/s"

      # Session store unavailable
      - alert: AutheliaRedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          service: authelia
          component: session
        annotations:
          summary: "Redis session store is down"
          description: "Redis is down. Active sessions may be lost."

  # ============================================================================
  # System Resource Alerts
  # ============================================================================
  - name: system_resource_alerts
    interval: 30s
    rules:
      # Disk space low
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint=~"/mnt/nvme[12]"} / node_filesystem_size_bytes) < 0.10
        for: 5m
        labels:
          severity: warning
          service: system
          component: disk
        annotations:
          summary: "Disk space is low on {{ $labels.mountpoint }}"
          description: "Only {{ $value | humanizePercentage }} disk space remaining on {{ $labels.mountpoint }}"
          current_value: "{{ $value | humanizePercentage }}"
          threshold: "10%"

      # Disk space critical
      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{mountpoint=~"/mnt/nvme[12]"} / node_filesystem_size_bytes) < 0.05
        for: 2m
        labels:
          severity: critical
          service: system
          component: disk
        annotations:
          summary: "Disk space is critically low on {{ $labels.mountpoint }}"
          description: "Only {{ $value | humanizePercentage }} remaining. Immediate action required!"
          current_value: "{{ $value | humanizePercentage }}"
          threshold: "5%"

      # High memory usage
      - alert: HighMemoryUsage
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
        for: 5m
        labels:
          severity: warning
          service: system
          component: memory
        annotations:
          summary: "System memory is running low"
          description: "Only {{ $value | humanizePercentage }} memory available."
          current_value: "{{ $value | humanizePercentage }}"
          threshold: "10%"

      # High CPU usage
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          severity: warning
          service: system
          component: cpu
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value | humanize }}% for 10+ minutes."
          current_value: "{{ $value | humanize }}%"
          threshold: "90%"

  # ============================================================================
  # Docker Container Alerts
  # ============================================================================
  - name: docker_alerts
    interval: 30s
    rules:
      # Container restarting frequently
      - alert: ContainerFrequentRestarts
        expr: rate(docker_container_restart_count[15m]) > 3
        labels:
          severity: warning
          service: docker
          component: container
        annotations:
          summary: "Container {{ $labels.name }} is restarting frequently"
          description: "Container has restarted {{ $value | humanize }} times in 15 minutes."
          current_value: "{{ $value | humanize }}"
          threshold: "3"

      # Container OOM killed
      - alert: ContainerOOMKilled
        expr: increase(docker_container_oom_kills_total[5m]) > 0
        labels:
          severity: critical
          service: docker
          component: container
        annotations:
          summary: "Container {{ $labels.name }} was OOM killed"
          description: "Container ran out of memory and was killed by the OS."

  # ============================================================================
  # Traefik (Reverse Proxy) Alerts
  # ============================================================================
  - name: traefik_alerts
    interval: 30s
    rules:
      # Service down
      - alert: TraefikDown
        expr: up{job="traefik"} == 0
        for: 1m
        labels:
          severity: critical
          service: traefik
          component: proxy
        annotations:
          summary: "Traefik reverse proxy is down"
          description: "All services are unreachable. Immediate action required."
          runbook_url: "https://orion.lab/docs/runbooks/traefik-down"

      # High error rate
      - alert: TraefikHighErrorRate
        expr: rate(traefik_service_requests_total{code=~"5.."}[5m]) > 10
        for: 3m
        labels:
          severity: warning
          service: traefik
          component: proxy
        annotations:
          summary: "High 5xx error rate on {{ $labels.service }}"
          description: "{{ $value | humanize }} errors per second on {{ $labels.service }}"
          current_value: "{{ $value | humanize }}/s"
          threshold: "10/s"

      # SSL certificate expiring soon
      - alert: SSLCertificateExpiringSoon
        expr: (traefik_tls_certs_not_after - time()) / 86400 < 7
        labels:
          severity: warning
          service: traefik
          component: tls
        annotations:
          summary: "SSL certificate expiring soon"
          description: "Certificate for {{ $labels.cn }} expires in {{ $value | humanize }} days."
          current_value: "{{ $value | humanize }} days"
          threshold: "7 days"
