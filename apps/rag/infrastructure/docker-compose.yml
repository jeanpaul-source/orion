services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: orion-qdrant
    restart: unless-stopped

    ports:
      # Bind to localhost only for security
      - "127.0.0.1:6333:6333"  # HTTP API
      - "127.0.0.1:6334:6334"  # gRPC API

    volumes:
      - /mnt/nvme2/orion-project/services/qdrant:/qdrant/storage

    environment:
      # Qdrant configuration
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      # SECURITY: API key disabled for homelab (uncomment to enable)
      # - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G

    # Health check
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # Log rotation
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

    # SECURITY: Removed privileged mode, seccomp=unconfined
    # AppArmor disabled to allow Unix socket operations (required by Tokio runtime)
    security_opt:
      - apparmor=unconfined

    networks:
      - orion-net

  # -- vLLM Inference Server (GPU-accelerated) --
  vllm:
    image: vllm/vllm-openai:v0.6.3
    container_name: orion-vllm
    restart: unless-stopped

    ports:
      # Bind to localhost only
      - "127.0.0.1:8000:8000"

    volumes:
      # Model cache on nvme1 (static data drive)
      - /mnt/nvme1/orion-data/models:/root/.cache/huggingface

    environment:
      # HuggingFace token (for gated models)
      - HF_TOKEN=${HF_TOKEN}
      - CUDA_VISIBLE_DEVICES=0
      # PyTorch memory fragmentation fix
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True

    # vLLM startup command
    # Using 14B AWQ model (quantized for 24GB VRAM)
    command: >
      --model Qwen/Qwen2.5-14B-Instruct-AWQ
      --quantization awq
      --dtype auto
      --gpu-memory-utilization 0.85
      --max-model-len 8192
      --tensor-parallel-size 1
      --trust-remote-code
      --api-key ${VLLM_API_KEY}

    # Resource limits and GPU access
    deploy:
      resources:
        limits:
          cpus: '12'
          memory: 20G
        reservations:
          cpus: '6'
          memory: 10G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s  # Model loading takes time

    # Log rotation
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

    # SECURITY: Removed privileged mode, seccomp=unconfined
    # GPU access via deploy.resources.devices is sufficient
    # AppArmor disabled to allow socketpair() syscalls (required by Python asyncio)
    security_opt:
      - apparmor=unconfined

    networks:
      - orion-net

    # Start after Qdrant (order matters for AnythingLLM)
    depends_on:
      - qdrant

  # -- AnythingLLM - RAG Orchestration & UI --
  anythingllm:
    image: mintplexlabs/anythingllm:1.8.3
    container_name: orion-anythingllm
    restart: unless-stopped

    ports:
      # Exposed to LAN (web UI)
      - "0.0.0.0:3001:3001"

    volumes:
      # App data on nvme2 (active data drive) - Prisma runs from /app/server
      - /mnt/nvme2/orion-project/services/anythingllm:/app/server/storage
      # PDFs on nvme1 (read-only)
      - /mnt/nvme1/orion-data/documents:/documents:ro
      # Persist npm cache to avoid permission issues on restart
      - /mnt/nvme2/orion-project/services/anythingllm-cache:/app/.npm
      # Collector hotdir backing store (required for API uploads)
      - /mnt/nvme2/orion-project/services/anythingllm-collector:/collector

    environment:
      # Storage path (must match Prisma's ../storage path from /app/server)
      - STORAGE_DIR=/app/server/storage

      # LLM Provider - Points to vLLM using service name
      - LLM_PROVIDER=generic-openai
      - GENERIC_OPEN_AI_BASE_PATH=http://vllm:8000/v1
      - GENERIC_OPEN_AI_MODEL_PREF=Qwen/Qwen2.5-14B-Instruct-AWQ
      - GENERIC_OPEN_AI_MODEL_TOKEN_LIMIT=8192
      - GENERIC_OPEN_AI_API_KEY=${VLLM_API_KEY}

      # Vector Database - Points to Qdrant using service name
      - VECTOR_DB=qdrant
      - QDRANT_ENDPOINT=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY}

      # Embedding Model (runs in AnythingLLM)
      # ⚠️ LOCKED 2025-11-19: nomic-embed-text-v1 selected for proven compatibility + quality
      # Xenova/nomic-embed-text-v1: 768d, 71% accuracy, proven with transformers.js (SAFE)
      # Alternative considered: BAAI/bge-m3 (72% accuracy) - compatibility with native engine unverified
      # ⚠️ WARNING: DO NOT CHANGE after processing documents - requires re-embedding ALL data
      - EMBEDDING_ENGINE=native
      - EMBEDDING_MODEL_PREF=Xenova/nomic-embed-text-v1
      - EMBEDDING_MODEL_MAX_CHUNK_LENGTH=8192

      # Authentication - Token bypasses password login
      - AUTH_TOKEN=${ANYTHINGLLM_AUTH_TOKEN}
      - SIG_KEY=orion_sig_key_for_homelab_use_only
      - SIG_SALT=orion_sig_salt_for_homelab_use_only

      # Server config
      - SERVER_PORT=3001
      - DISABLE_TELEMETRY=true

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
        reservations:
          cpus: '4'
          memory: 8G

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/system/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Log rotation
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined

    networks:
      - orion-net

    # Wait for backends to be ready
    depends_on:
      qdrant:
        condition: service_healthy
      vllm:
        condition: service_healthy

  # NOTE: command-api removed (2025-11-18) - replaced by ORION Core unified interface
  # ORION Core provides same functionality via Action subsystem with DevOps Agent

  # -- n8n - Workflow Automation (OPTIONAL) --
  n8n:
    image: n8nio/n8n:1.115.0
    container_name: orion-n8n
    restart: unless-stopped

    ports:
      # Exposed to LAN (web UI)
      - "0.0.0.0:5678:5678"

    volumes:
      - /mnt/nvme2/orion-project/services/n8n:/home/node/.n8n
      - /mnt/nvme2/orion-project/logs:/mnt/nvme2/orion-project/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/nvme1:/mnt/nvme1:ro
      - /mnt/nvme2:/mnt/nvme2

    # SECURITY NOTE: pid: "host" removed for better container isolation
    # If Execute Command node needs host process access, re-enable with documentation:
    # pid: "host"

    # SECURITY: Run as non-root user instead of 0:0
    # If root is absolutely required for Execute Command node, add comment explaining why
    user: "1000:1000"

    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - GENERIC_TIMEZONE=America/New_York
      - N8N_LOG_LEVEL=info
      - N8N_SECURE_COOKIE=false
      # SECURITY: Enable authentication (was disabled)
      # For local-only homelab, you may set this to false, but NOT recommended
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_ADMIN_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_ADMIN_PASSWORD}
      # User management for teams (optional)
      - N8N_USER_MANAGEMENT_DISABLED=false
      - N8N_OWNER_EMAIL=${N8N_OWNER_EMAIL:-admin@localhost}
      # Allow Execute Command node access
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # CRITICAL: Enable Execute Command node
      - EXECUTIONS_MODE=regular
      - N8N_RUNNERS_ENABLED=false

    # Resource limits (n8n is lightweight)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 2G

    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Log rotation
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

    networks:
      - orion-net

  # -- ORION Core - Unified AI Interface --
  orion-core:
    build:
      context: /root/orion
      dockerfile: applications/orion-core/Dockerfile
    container_name: orion-core
    restart: unless-stopped

    ports:
      # Exposed to LAN (web UI)
      - "0.0.0.0:5000:5000"

    environment:
      # Application
      - ORION_ENVIRONMENT=production
      - ORION_LOG_LEVEL=INFO
      # Service URLs (Docker internal network)
      - ORION_VLLM_URL=http://vllm:8000
      - ORION_QDRANT_URL=http://qdrant:6333
      - ORION_ANYTHINGLLM_URL=http://anythingllm:3001
      - ORION_OLLAMA_URL=http://host.docker.internal:11434
      - ORION_N8N_URL=http://n8n:5678
      # API Keys
      - ORION_VLLM_API_KEY=${VLLM_API_KEY}
      - ORION_ANYTHINGLLM_API_KEY=${ANYTHINGLLM_API_KEY}
      # DevOps Agent (Action subsystem)
      - DEVIA_VLLM_URL=http://vllm:8000/v1
      - DEVIA_VLLM_MODEL=Qwen/Qwen2.5-14B-Instruct-AWQ
      - DEVIA_VLLM_API_KEY=${VLLM_API_KEY}
      # Features
      - ORION_ENABLE_KNOWLEDGE=true
      - ORION_ENABLE_ACTION=true
      - ORION_ENABLE_LEARNING=true
      - ORION_ENABLE_WATCH=true

    volumes:
      - /mnt/nvme1/orion-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro

    security_opt:
      - apparmor=unconfined

    networks:
      - orion-net

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

# -- Networks --
networks:
  orion-net:
    driver: bridge
    name: orion-net
