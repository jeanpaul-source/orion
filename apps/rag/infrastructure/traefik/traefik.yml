# Traefik Static Configuration
# Version: 3.2
# Purpose: Reverse proxy for ORION ecosystem with SSL/TLS

# API and Dashboard
api:
  dashboard: true
  insecure: false  # Dashboard accessible only via router with auth

# Entry Points (ports)
entryPoints:
  # HTTP (redirects to HTTPS)
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  # HTTPS (main entry point)
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
        domains:
          - main: orion.lab
            sans:
              - "*.orion.lab"

  # Traefik dashboard (internal only)
  traefik:
    address: ":8080"

# Certificate Resolvers
certificatesResolvers:
  # Let's Encrypt (ACME)
  letsencrypt:
    acme:
      email: admin@orion.lab  # TODO: Update with your email
      storage: /etc/traefik/acme/acme.json
      # Use staging for testing, production for real certs
      # caServer: https://acme-staging-v02.api.letsencrypt.org/directory  # Staging
      caServer: https://acme-v02.api.letsencrypt.org/directory  # Production

      # HTTP challenge (for public domains)
      httpChallenge:
        entryPoint: web

      # DNS challenge (for wildcard certs - optional)
      # Uncomment and configure if using DNS provider
      # dnsChallenge:
      #   provider: cloudflare
      #   resolvers:
      #     - "1.1.1.1:53"
      #     - "8.8.8.8:53"

  # Self-signed certificates (for local .lab domain)
  selfsigned:
    acme:
      email: admin@orion.lab
      storage: /etc/traefik/acme/acme-selfsigned.json
      # Self-signed CA
      caServer: https://localhost:14000/dir
      # TLS challenge for self-signed
      tlsChallenge: {}

# Providers
providers:
  # Docker provider (automatic service discovery)
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false  # Only expose services with traefik.enable=true
    network: orion-net
    watch: true

  # File provider (dynamic configuration)
  file:
    directory: /etc/traefik/dynamic
    watch: true

# Logging
log:
  level: INFO
  filePath: /var/log/traefik/traefik.log
  format: json

# Access logs
accessLog:
  filePath: /var/log/traefik/access.log
  format: json
  bufferingSize: 100
  filters:
    statusCodes:
      - "200"
      - "300-302"
      - "400-499"
      - "500-599"

# Metrics (Prometheus)
metrics:
  prometheus:
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    entryPoint: traefik
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0

# Global settings
global:
  checkNewVersion: true
  sendAnonymousUsage: false
