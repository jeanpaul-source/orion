# Traefik Dynamic Configuration - TLS Settings
# SSL/TLS configuration for secure connections

tls:
  # TLS options (cipher suites, min version, etc.)
  options:
    # Modern TLS (recommended)
    modern:
      minVersion: VersionTLS12
      maxVersion: VersionTLS13
      cipherSuites:
        # TLS 1.3 (preferred)
        - TLS_AES_128_GCM_SHA256
        - TLS_AES_256_GCM_SHA384
        - TLS_CHACHA20_POLY1305_SHA256

        # TLS 1.2 (fallback)
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256

      curvePreferences:
        - CurveP521
        - CurveP384

      sniStrict: true
      alpnProtocols:
        - h2
        - http/1.1

    # Intermediate TLS (broader compatibility)
    intermediate:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
        - TLS_RSA_WITH_AES_128_GCM_SHA256
        - TLS_RSA_WITH_AES_256_GCM_SHA384

  # TLS stores (default certificate)
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/orion.lab.crt
        keyFile: /etc/traefik/certs/orion.lab.key

  # Additional certificates (manual)
  certificates:
    # Self-signed cert for orion.lab (generated during setup)
    - certFile: /etc/traefik/certs/orion.lab.crt
      keyFile: /etc/traefik/certs/orion.lab.key
      stores:
        - default

    # Wildcard cert for *.orion.lab (if using DNS challenge)
    # - certFile: /etc/traefik/certs/wildcard.orion.lab.crt
    #   keyFile: /etc/traefik/certs/wildcard.orion.lab.key
    #   stores:
    #     - default
