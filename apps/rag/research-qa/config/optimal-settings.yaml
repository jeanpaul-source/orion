# ORION RAG - Optimal Configuration
#
# Purpose: Production-grade settings optimized for quality and intelligence
# Created: 2025-11-17
# Status: Starting fresh - these are recommended baseline settings
#
# Use this as your reference configuration for all ingestion and query operations.

# =============================================================================
# EMBEDDING CONFIGURATION
# =============================================================================
embedding:
  # Model configuration (matches docker-compose.yml)
  model: "Xenova/nomic-embed-text-v1"
  dimensions: 768
  max_tokens: 8192  # Full model capacity (vs 512 tokens we were using!)

  # Embedding API settings
  api_url: "http://192.168.5.10:3001/api/v1/embed"
  batch_size: 32  # Process 32 texts per API call
  timeout: 30  # Seconds

  # Why nomic-embed-text-v1?
  # - 16x larger token capacity than BGE (8192 vs 512)
  # - Better long-context understanding
  # - Trained on instruction-following tasks
  # - More recent model (2024 vs 2023)

# =============================================================================
# CHUNKING STRATEGY
# =============================================================================
chunking:
  # Strategy: semantic (RecursiveCharacterTextSplitter)
  # Respects document structure (paragraphs → sentences → words)
  strategy: "semantic"

  # Separators for semantic chunking (in order of priority)
  separators:
    - "\n\n"    # Paragraph breaks (highest priority)
    - "\n"      # Line breaks
    - ". "      # Sentences
    - " "       # Words
    - ""        # Characters (fallback)

  # Domain-specific chunk sizes (OPTIMIZED from 512 → 1024)
  academic:
    size: 1024        # 2x original plan (better context)
    overlap: 128      # 12.5% overlap (industry standard)
    rationale: "Research papers benefit from larger context to preserve complete arguments"

  manuals:
    size: 1024
    overlap: 128
    rationale: "Technical docs need full procedures/instructions in single chunk"

  blogs:
    size: 1024
    overlap: 128
    rationale: "Blog posts benefit from complete sections/examples"

  github:
    size: 512         # Smaller for code (kept at 512)
    overlap: 64       # 12.5% overlap
    rationale: "Code snippets work better with smaller, focused chunks"

  exports:
    size: 1024
    overlap: 128
    rationale: "Structured data with context"

# =============================================================================
# QUALITY GATES (Domain-Specific)
# =============================================================================
quality_gates:
  # Academic papers - Strict quality requirements
  academic:
    min_text_density: 0.55      # High text-to-content ratio
    min_length: 5000            # Substantial content
    max_length: 5_000_000       # Reasonable upper bound
    require_citations: true     # Must have [1], et al., etc.
    allow_tables: true
    allow_code_blocks: false
    rationale: "Research papers should be text-heavy with citations"

  # Technical manuals - Moderate requirements
  manuals:
    min_text_density: 0.35      # Allow diagrams/images
    min_length: 1000
    max_length: 10_000_000
    require_citations: false
    allow_tables: true
    allow_code_blocks: true
    rationale: "Manuals often have diagrams, code examples, and tables"

  # Blog posts - Moderate requirements
  blogs:
    min_text_density: 0.35
    min_length: 800
    max_length: 1_000_000
    require_citations: false
    allow_tables: false
    allow_code_blocks: true
    rationale: "Blogs are informal with code examples"

  # GitHub docs - Relaxed requirements
  github:
    min_text_density: 0.20      # Markdown-heavy, lots of formatting
    min_length: 500
    max_length: 500_000
    require_citations: false
    allow_tables: true
    allow_code_blocks: true
    rationale: "READMEs have lots of markdown syntax, code blocks"

  # Structured data - Very relaxed
  exports:
    min_text_density: 0.10      # CSV/JSON have low text density
    min_length: 100
    max_length: 50_000_000
    require_citations: false
    allow_tables: true
    allow_code_blocks: false
    enabled: false              # Not implemented yet
    rationale: "Structured data is table/JSON-heavy"

# =============================================================================
# vLLM CONFIGURATION
# =============================================================================
vllm:
  # Model configuration
  model: "Qwen/Qwen2.5-14B-Instruct-AWQ"
  quantization: "awq"           # 4-bit quantization
  dtype: "auto"

  # Performance settings (OPTIMIZED)
  gpu_memory_utilization: 0.85  # Increased from 0.7 (21% more VRAM)
  max_model_len: 8192           # Context window (matches embedding capacity)
  tensor_parallel_size: 1       # Single GPU

  # API settings
  api_url: "http://192.168.5.10:8000"
  api_key_env: "VLLM_API_KEY"

  # Why 0.85 GPU utilization?
  # - Production standard (dev: 0.6-0.7, prod: 0.8-0.9)
  # - 21% more VRAM for KV cache (16.8GB → 20.4GB)
  # - 2x concurrent request capacity
  # - Safe for AWQ quantization

# =============================================================================
# RETRIEVAL CONFIGURATION (INTELLIGENCE FEATURES)
# =============================================================================
retrieval:
  # Enable hybrid search (vector + keyword)
  hybrid_search:
    enabled: true
    vector_weight: 0.7          # 70% semantic similarity
    keyword_weight: 0.3         # 30% exact matching
    candidate_pool_size: 20     # Retrieve 20 candidates per method
    rrf_k: 60                   # Reciprocal Rank Fusion parameter
    benefit: "30-40% better recall than vector search alone"

  # Enable reranking with cross-encoder
  reranking:
    enabled: true
    model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    top_k_input: 20             # Rerank top 20 from hybrid search
    top_k_output: 5             # Return top 5 after reranking
    benefit: "20-30% better relevance at ~500ms latency cost"

  # Query settings
  query:
    default_top_k: 5            # Final results to return
    min_score: 0.0              # Minimum similarity score
    max_context_tokens: 5120    # 5 chunks × 1024 tokens (vs 2560 with 512)

  # Advanced features (optional)
  advanced:
    mmr_enabled: false          # Maximal Marginal Relevance (reduce redundancy)
    mmr_lambda: 0.5             # Balance relevance vs diversity
    query_routing: false        # Route simple vs complex queries differently
    adaptive_top_k: false       # Adjust top_k based on query complexity

# =============================================================================
# PROCESSING CONFIGURATION
# =============================================================================
processing:
  # Parallel processing
  parallel:
    enabled: true
    num_workers: 4              # Process 4 documents simultaneously
    batch_size: 10              # Documents per batch for embedding
    benefit: "4x faster batch ingestion on multi-core systems"

  # Progress tracking
  progress:
    log_interval: 10            # Log every 10 documents
    checkpoint_interval: 100    # Save progress every 100 documents

  # Error handling
  error_handling:
    max_retries: 3              # Retry failed documents
    retry_delay: 2              # Seconds between retries
    skip_on_persistent_error: true  # Skip after max retries

# =============================================================================
# DEDUPLICATION CONFIGURATION
# =============================================================================
deduplication:
  # Three-layer deduplication strategy
  method: "content_hash"        # SHA256 content hashing

  # Registry settings
  registry:
    type: "sqlite"              # SQLite database
    path: "/mnt/nvme1/orion-data/documents/metadata/ingestion.db"
    persist_across_restarts: true

  # Deduplication layers
  layers:
    - name: "file_path"
      enabled: true
      description: "Fast check - have we seen this exact file path?"

    - name: "content_hash"
      enabled: true
      description: "Detects identical content with different filenames"

    - name: "status_tracking"
      enabled: true
      description: "Track: ingested, rejected, error"

# =============================================================================
# COLLECTION ROUTING
# =============================================================================
collections:
  research-papers:
    domains: ["academic"]
    description: "Academic research papers with citations"
    embedding_dim: 768
    distance_metric: "cosine"

  technical-docs:
    domains: ["manuals", "blogs"]
    description: "Technical documentation and blog posts"
    embedding_dim: 768
    distance_metric: "cosine"

  code-examples:
    domains: ["github"]
    description: "GitHub READMEs and code documentation"
    embedding_dim: 768
    distance_metric: "cosine"

  structured-data:
    domains: ["exports"]
    description: "Structured data exports (CSV, JSON)"
    embedding_dim: 768
    distance_metric: "cosine"
    enabled: false

# =============================================================================
# MONITORING & METRICS
# =============================================================================
monitoring:
  # Performance metrics to track
  metrics:
    - "documents_processed_total"
    - "documents_accepted_count"
    - "documents_rejected_count"
    - "average_chunks_per_document"
    - "processing_time_seconds"
    - "embedding_time_seconds"
    - "storage_time_seconds"

  # Quality metrics
  quality_metrics:
    - "acceptance_rate"           # Target: >70%
    - "average_text_density"      # Target: domain-specific
    - "duplicate_detection_rate"  # Lower is better

  # Query metrics
  query_metrics:
    - "query_latency_ms"          # Target: <2000ms
    - "retrieval_latency_ms"      # Target: <200ms
    - "reranking_latency_ms"      # Target: <500ms
    - "answer_relevance_score"    # Manual evaluation

# =============================================================================
# EXPECTED PERFORMANCE BENCHMARKS
# =============================================================================
benchmarks:
  ingestion:
    processing_speed: "2-5 PDFs/sec (CPU-only parsing)"
    acceptance_rate: ">70%"
    avg_chunks_per_doc: "15-30 for academic papers"
    embedding_speed: "80 vectors/sec with batch_size=32"

  query:
    vector_search: "<100ms"
    keyword_search: "<100ms"
    hybrid_merge: "<50ms"
    reranking: "200-500ms"
    total_latency: "<2000ms"
    context_quality: "2x better with 1024 tokens vs 512"

  quality:
    recall_improvement: "30-40% with hybrid search"
    relevance_improvement: "20-30% with reranking"
    answer_completeness: "2x better with larger chunks"

# =============================================================================
# NOTES & RATIONALE
# =============================================================================
notes: |
  Configuration Rationale:

  1. Chunk Size (1024 tokens):
     - Industry standard (LangChain: 1000, LlamaIndex: 1024)
     - 2x more context per retrieval (5120 vs 2560 tokens)
     - Still under 8192 model capacity (leaves room for growth)
     - Better semantic coherence (complete paragraphs)

  2. GPU Utilization (0.85):
     - Production standard for dedicated RAG systems
     - 21% more throughput vs 0.7
     - Safe for AWQ quantized models

  3. Hybrid Search:
     - 30-40% better recall in academic benchmarks
     - Catches exact phrase matches + semantic matches
     - Minimal latency cost (~200ms total)

  4. Reranking:
     - 20-30% better relevance
     - Worth the ~500ms latency for quality-focused use case
     - Cross-encoder is more accurate than vector similarity

  5. Parallel Processing:
     - 4x faster batch ingestion
     - Efficient use of multi-core CPUs
     - No GPU required for document processing

  Quality-First Approach:
     - Start with optimal settings from day 1
     - No migration pain later
     - Designed for 1.2M+ vector knowledge base
     - Prioritizes answer quality over speed
