# ORION Configuration: Profiles for multi-machine architecture
#
# ENVIRONMENT VARIABLES TAKE PRECEDENCE:
# - QDRANT_URL overrides qdrant_url
# - EMBED_SERVER_URL overrides embed_url
# - OLLAMA_URL overrides ollama_url
#
# See .env.example for all available environment variables

[system]
# Default profile to load when --profile is not specified
default_profile = "host"

# ─────────────────────────────────────────────────────────────────────────────
# Host profile: All compute runs on the host (GPU embedding, Qdrant, LLM)
# ─────────────────────────────────────────────────────────────────────────────
[profiles.host]
name = "host"
description = "Host-only compute (laptop orchestrates; host runs embedding, DB, LLM)"

# Service endpoints (defaults - override with environment variables)
# Use environment variables: QDRANT_URL, EMBED_SERVER_URL, OLLAMA_URL
qdrant_url = "http://192.168.5.10:6333"  # Default: host machine
embed_url = "http://192.168.5.10:8001"    # Default: host machine
ollama_url = "http://192.168.5.10:11434"  # Default: host machine

# Compute settings
force_cpu = false  # Host uses GPU by default

# Optional paths (leave empty to use defaults from orion_common.paths)
data_dir = ""
config_dir = ""
log_level = "INFO"

# ─────────────────────────────────────────────────────────────────────────────
# Laptop profile: Orchestrate from laptop; enforce CPU-only safety
# ─────────────────────────────────────────────────────────────────────────────
[profiles.laptop]
name = "laptop"
description = "Laptop orchestrator; all compute delegated to host"

# Same endpoints as host profile (override with environment variables)
# Use environment variables: QDRANT_URL, EMBED_SERVER_URL, OLLAMA_URL
qdrant_url = "http://192.168.5.10:6333"  # Default: host machine
embed_url = "http://192.168.5.10:8001"    # Default: host machine
ollama_url = "http://192.168.5.10:11434"  # Default: host machine

# Safety: force CPU on laptop to avoid accidental local CUDA
force_cpu = true

# Optional overrides
data_dir = ""
config_dir = ""
log_level = "INFO"

# ─────────────────────────────────────────────────────────────────────────────
# Dev profile: Local testing with mocks or lightweight services
# ─────────────────────────────────────────────────────────────────────────────
[profiles.dev]
name = "dev"
description = "Development profile with optional local services"

# Local endpoints for testing
qdrant_url = "http://localhost:6333"
embed_url = "http://localhost:8001"
ollama_url = "http://localhost:11434"

force_cpu = true
data_dir = ""
config_dir = ""
log_level = "DEBUG"
