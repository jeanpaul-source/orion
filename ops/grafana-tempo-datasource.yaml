# Grafana provisioning — Tempo datasource.
# Copy to the Grafana provisioning directory in the monitoring stack:
#   /opt/homelab-infrastructure/monitoring-stack/grafana/provisioning/datasources/
apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    version: 1
    editable: true
    jsonData:
      httpMethod: GET
      nodeGraph:
        enabled: true
      serviceMap:
        datasourceUid: prometheus
