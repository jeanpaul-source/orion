# Grafana Tempo — single-node config for homelab OTel trace storage.
# Deployed in the monitoring stack at /opt/homelab-infrastructure/monitoring-stack/
# HAL emits traces via OTLP HTTP on port 4318 (hal/tracing.py).

stream_over_http_enabled: true

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 168h   # 7 days

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
